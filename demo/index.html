<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Gantt Chart Demo</title>

    <!-- Tailwind CSS v4 (CDN – for demo/prototyping only; use the installed
         `tailwindcss` package with a build step for production deployments) -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Gantt chart styles -->
    <link rel="stylesheet" href="../codebase/dhtmlxgantt.css" />

    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        padding: 0;
      }

      #gantt-container {
        height: calc(100vh - 160px);
      }
    </style>
  </head>

  <body class="bg-gray-50 font-sans text-gray-900">
    <!-- Navigation -->
    <header class="bg-white shadow-sm">
      <div class="mx-auto max-w-7xl px-4 py-4 sm:px-6 lg:px-8">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3">
            <svg
              class="h-8 w-8 text-blue-600"
              fill="none"
              stroke="currentColor"
              viewBox="0 0 24 24"
            >
              <path
                stroke-linecap="round"
                stroke-linejoin="round"
                stroke-width="2"
                d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
              />
            </svg>
            <h1 class="text-xl font-bold text-gray-900">Gantt</h1>
          </div>
          <span class="rounded-full bg-blue-100 px-3 py-1 text-sm font-medium text-blue-700">
            Demo
          </span>
        </div>
      </div>
    </header>

    <!-- Main content -->
    <main class="mx-auto max-w-7xl px-4 py-6 sm:px-6 lg:px-8">
      <div class="mb-4">
        <h2 class="text-2xl font-semibold text-gray-800">Project Schedule</h2>
        <p class="mt-1 text-sm text-gray-500">
          Interactive Gantt chart for project timeline management.
        </p>
      </div>

      <!-- Gantt chart wrapper -->
      <div class="overflow-hidden rounded-xl border border-gray-200 bg-white shadow-sm">
        <div id="gantt-container"></div>
      </div>
    </main>

    <!-- Gantt chart script -->
    <script src="../codebase/dhtmlxgantt.js"></script>
    <script>
      gantt.config.date_format = "%Y-%m-%d %H:%i";
      gantt.config.drag_resize = true;
      gantt.config.drag_move = true;
      gantt.config.drag_progress = true;
      gantt.config.open_tree_initially = true;

      gantt.init("gantt-container");

      gantt.parse({
        data: [
          {
            id: 1,
            text: "Project Alpha",
            start_date: null,
            duration: null,
            parent: 0,
            progress: 0,
            open: true,
          },
          {
            id: 2,
            text: "Planning",
            start_date: "2024-01-01 00:00",
            duration: 5,
            parent: 1,
            progress: 1,
          },
          {
            id: 3,
            text: "Design",
            start_date: "2024-01-06 00:00",
            duration: 7,
            parent: 1,
            progress: 0.6,
          },
          {
            id: 4,
            text: "Development",
            start_date: null,
            duration: null,
            parent: 1,
            progress: 0.3,
            open: true,
          },
          {
            id: 5,
            text: "Frontend",
            start_date: "2024-01-13 00:00",
            duration: 10,
            parent: 4,
            progress: 0.5,
          },
          {
            id: 6,
            text: "Backend",
            start_date: "2024-01-15 00:00",
            duration: 8,
            parent: 4,
            progress: 0.2,
          },
          {
            id: 7,
            text: "Testing",
            start_date: "2024-01-23 00:00",
            duration: 5,
            parent: 1,
            progress: 0,
          },
          {
            id: 8,
            text: "Deployment",
            start_date: "2024-01-28 00:00",
            duration: 2,
            parent: 1,
            progress: 0,
          },
        ],
        links: [
          { id: 1, source: 2, target: 3, type: "0" },
          { id: 2, source: 3, target: 4, type: "0" },
          { id: 3, source: 5, target: 7, type: "0" },
          { id: 4, source: 6, target: 7, type: "0" },
          { id: 5, source: 7, target: 8, type: "0" },
        ],
      });
    </script>
  </body>
</html>
